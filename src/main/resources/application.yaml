spring:
  application:
    name: productsapi

  datasource:
    # Use environment variables with safe defaults for local development
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:productsdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    out-of-order: false
    sql-migration-prefix: V
    sql-migration-suffixes: .sql

logging:
  level:
    org.flywaydb: DEBUG
